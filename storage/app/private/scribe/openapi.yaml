                          example: confirmed
                        total:
                          type: integer
                          example: 500
                  code:
                    type: integer
                    example: 200
      tags:
        - 'Sale Orders'
    post:
      summary: 'Create Sale Order'
      operationId: createSaleOrder
      description: "Creates a new sale order for a customer during an active trip.\nFor `cash`: the full amount is automatically recorded as paid.\nFor `credit`: zero payment is recorded; customer owes full amount.\nFor `partial`: provide `paid_amount` for the upfront payment."
      parameters: []
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'تم إنشاء فاتورة البيع بنجاح'
                  data:
                    id: 1
                    order_number: INV-001
                    total: 500
                    paid_amount: 500
                  code: 201
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم إنشاء فاتورة البيع بنجاح'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      order_number:
                        type: string
                        example: INV-001
                      total:
                        type: integer
                        example: 500
                      paid_amount:
                        type: integer
                        example: 500
                  code:
                    type: integer
                    example: 201
        400:
          description: 'Trip not active'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'لا يمكن إنشاء فاتورة بيع لرحلة غير نشطة'
                  data: null
                  code: 400
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'لا يمكن إنشاء فاتورة بيع لرحلة غير نشطة'
                  data:
                    type: string
                    example: null
                    nullable: true
                  code:
                    type: integer
                    example: 400
      tags:
        - 'Sale Orders'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: integer
                  description: 'Customer ID.'
                  example: 3
                payment_method:
                  type: string
                  description: 'One of: `cash`, `credit`, `partial`.'
                  example: cash
                discount_amount:
                  type: number
                  description: 'nullable Order-level discount value.'
                  example: 50.0
                  nullable: true
                discount_type:
                  type: string
                  description: 'nullable `fixed` or `percentage`.'
                  example: fixed
                  nullable: true
                due_date:
                  type: string
                  description: 'nullable Payment due date (YYYY-MM-DD) for credit orders.'
                  example: '2026-06-01'
                  nullable: true
                notes:
                  type: string
                  description: 'nullable Notes.'
                  example: 'تسليم سريع'
                  nullable: true
                paid_amount:
                  type: number
                  description: 'nullable Required when payment_method is `partial`.'
                  example: 200.0
                  nullable: true
                items:
                  type: array
                  description: 'Sale items.'
                  example:
                    - architecto
                  items:
                    type: string
              required:
                - customer_id
                - payment_method
                - items
    parameters:
      -
        in: path
        name: trip
        description: 'The trip ID.'
        example: 1
        required: true
        schema:
          type: integer
